<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Career Counsellor - Login or Register to get personalized career recommendations.">
    <title>AI Career Counsellor - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="bg-animated"></div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon">🎓</div>
                <h1>AI Career Counsellor</h1>
                <p>Discover your ideal career path</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="loginPassword" placeholder="Enter your password" required style="padding-right: 40px;">
                        <span onclick="togglePassword('loginPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 1.1rem; user-select: none;">👁️</span>
                    </div>
                </div>
                <div class="auth-inline-actions">
                    <button type="button" class="auth-link-btn" onclick="toggleForgotPassword()">Forgot password?</button>
                </div>
                <div id="forgotPasswordSection" class="forgot-password-section" style="display:none;">
                    <div class="form-group">
                        <label for="forgotUsername">Username</label>
                        <input type="text" id="forgotUsername" placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label for="forgotEmail">Registered Email</label>
                        <input type="email" id="forgotEmail" placeholder="Enter your registered email">
                    </div>
                    <div class="form-group">
                        <label for="forgotNewPassword">New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="forgotNewPassword" placeholder="Create a new password" style="padding-right: 40px;">
                            <span onclick="togglePassword('forgotNewPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 1.1rem; user-select: none;">👁️</span>
                        </div>
                    </div>
                    <button type="button" class="btn-primary" id="forgotBtn" onclick="handleForgotPassword()">Reset Password</button>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regFullname">Full Name</label>
                    <input type="text" id="regFullname" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="regPassword" placeholder="Create a password" required style="padding-right: 40px;">
                        <span onclick="togglePassword('regPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 1.1rem; user-select: none;">👁️</span>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
            </form>

            <!-- Message Area -->
            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/chat';
        }

        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('forgotPasswordSection').style.display = 'none';
            document.getElementById('authMessage').className = 'auth-message';
        }

        function showMessage(text, type) {
            const el = document.getElementById('authMessage');
            el.textContent = text;
            el.className = 'auth-message ' + type;
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        function toggleForgotPassword() {
            const section = document.getElementById('forgotPasswordSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('user_id', data.user_id);
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/chat', 800);
                } else {
                    showMessage(data.detail || 'Login failed.', 'error');
                }
            } catch (err) {
                showMessage('Network error. Please try again.', 'error');
            }
            btn.textContent = 'Sign In';
            btn.disabled = false;
        }

        async function handleForgotPassword() {
            const username = document.getElementById('forgotUsername').value.trim();
            const email = document.getElementById('forgotEmail').value.trim();
            const newPassword = document.getElementById('forgotNewPassword').value.trim();

            if (!username || !email || !newPassword) {
                showMessage('Please fill username, email, and new password.', 'error');
                return;
            }

            const btn = document.getElementById('forgotBtn');
            btn.textContent = 'Resetting...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        new_password: newPassword,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('Password reset successful! Please sign in.', 'success');
                    document.getElementById('forgotUsername').value = '';
                    document.getElementById('forgotEmail').value = '';
                    document.getElementById('forgotNewPassword').value = '';
                    document.getElementById('forgotPasswordSection').style.display = 'none';
                } else {
                    showMessage(data.detail || 'Password reset failed.', 'error');
                }
            } catch (err) {
                showMessage('Network error. Please try again.', 'error');
            }

            btn.textContent = 'Reset Password';
            btn.disabled = false;
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.textContent = 'Creating account...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        full_name: document.getElementById('regFullname').value,
                        username: document.getElementById('regUsername').value,
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPassword').value,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('Account created! Please log in.', 'success');
                    setTimeout(() => switchTab('login'), 1200);
                } else {
                    showMessage(data.detail || 'Registration failed.', 'error');
                }
            } catch (err) {
                showMessage('Network error. Please try again.', 'error');
            }
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    </script>
</body>
</html>
